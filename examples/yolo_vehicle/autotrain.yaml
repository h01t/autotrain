# AutoTrain config for vehicle detection (YOLO + KITTI)

agent:
  provider: deepseek
  model: deepseek-v4-pro
  temperature: 0.3
  hard_timeout_seconds: 180

metric:
  name: mAP
  target: 0.90
  direction: maximize

budget:
  time_seconds: 14400      # 4 hours
  max_iterations: 50
  api_dollars: 2.00         # Hard cap
  experiment_timeout_seconds: 900  # 15 min per training run

execution:
  train_command: ".venv/bin/python train.py"
  mode: ssh
  ssh_host: blackbox
  ssh_remote_dir: /home/holt/dev/object-det
  ssh_setup_command: "~/.local/bin/uv sync"  # Install deps on remote before first run
  gpu_device: "0"

sandbox:
  writable_files:
    - train.py

notify:
  terminal: true
